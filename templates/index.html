<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Just Eat Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <style>
        h1 {
            font-family: 'Bungee', cursive;
            color: #ff8000;
        }

        .btn-primary {
            background-color: #ff8000 !important;
            border-color: #ff8000 !important;
        }

        body {
            background-color: #f7efc6
        }

        .divider {
            width: 100%;
            height: 8px;
            background-color: #ff8000;
            border-radius: 10px;
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="display-3 fw-bold">Restaurant Finder</h1>
            <p class="text-muted">Find the best local restaurants</p>
        </div>

        <div class="d-flex justify-content-center mb-5">
            <div class="divider"></div>
        </div>

        <div class="row justify-content-center mb-5">
            <div class="col-md-6">
                <form action="/" method="get" class="input-group input-group-lg shadow-sm">
                    <input type="text" name="postcode" class="form-control border-2"
                        placeholder="Enter Postcode (e.g. EC4M7RF)" value="{{ postcode }}"
                        style="border-color: #ff8000;">
                    <button type="submit" class="btn btn-primary px-4 fw-bold">Search</button>
                </form>
            </div>
        </div>

        <div class="row justify-content-center mt-3 g-2">
            <div class="col-md-3">
                <input type="text" name="search" class="form-control form-control-sm border-2"
                    placeholder="Filter by name/cuisine..." value="{{ request.args.get('search', '') }}"
                    style="border-color: black;">
            </div>
            <div class="col-md-2">
                <select name="min_rating" class="form-select form-select-sm border-2" style="border-color: black;">
                    <option value="">Min Rating</option>
                    {% for i in range(1, 6) %}
                    <option value="{{ i }}" {{ 'selected' if request.args.get('min_rating')==i|string }}>{{ i }}+ Stars
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <select name="sort" class="form-select form-select-sm border-2" style="border-color: black;">
                    <option value="">Sort By...</option>
                    <option value="rating_desc" {{ 'selected' if request.args.get('sort')=='rating_desc' }}>Highest
                        Rating</option>
                    <option value="name_asc" {{ 'selected' if request.args.get('sort')=='name_asc' }}>Name (A-Z)
                    </option>
                    <option value="time_asc" {{ 'selected' if request.args.get('sort')=='time_asc' }}>Fastest Delivery
                    </option>
                </select>
            </div>
        </div>

        <div class="row g-4">
            {% for res in restaurants %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ res.name }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ res.cuisines }}</h6>
                        <p class="text-warning mb-2">⭐ {{ res.rating }}</p>
                        <p class="card-text small text-secondary">{{ res.address }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>

</html>
