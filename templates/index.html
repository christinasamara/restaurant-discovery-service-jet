<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Just Eat Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h1 class="mb-4">Just Eat Discovery: {{ postcode }}</h1>
        
        <form action="/" method="get" class="d-flex gap-2 mb-5">
            <input type="text" name="postcode" class="form-control" placeholder="Enter Postcode (e.g. EC4M7RF)" value="{{ postcode }}">
            <button type="submit" class="btn btn-primary">Search</button>
        </form>

        <div class="row g-4">
            {% for res in restaurants %}
            <div class="col-md-6 col-lg-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">{{ res.name }}</h5>
                        <h6 class="card-subtitle mb-2 text-muted">{{ res.cuisine }}</h6>
                        <p class="text-warning mb-2">⭐ {{ res.rating }}</p>
                        <p class="card-text small text-secondary">{{ res.address }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
